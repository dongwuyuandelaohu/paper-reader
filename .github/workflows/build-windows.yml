name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-pc-windows-msvc
    
    - name: Install frontend dependencies
      run: npm ci
      working-directory: ./frontend
    
    - name: Build frontend
      run: npm run build
      working-directory: ./frontend
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
      working-directory: ./backend
    
    - name: Build backend executable
      run: |
        cd backend
        pyinstaller --name main --onefile --noconsole main.py
      shell: pwsh
    
    - name: Copy backend to Tauri resources
      run: |
        mkdir -p src-tauri/resources/backend
        Copy-Item -Path "backend/dist/main/main.exe" -Destination "src-tauri/resources/backend/"
        Copy-Item -Path "backend/dist/main/_internal/*" -Destination "src-tauri/resources/backend/" -Recurse -ErrorAction SilentlyContinue
      shell: pwsh
    
    - name: Build Tauri app
      uses: tauri-apps/tauri-action@v0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tagName: v__VERSION__
        releaseName: "PaperLens v__VERSION__"
        releaseBody: |
          ## PaperLens - 学术论文阅读助手
          
          ### 安装说明
          1. 下载 `PaperLens_x64_en-US.msi` 或 `PaperLens_x64-setup.exe`
          2. 运行安装程序
          3. 按照提示完成安装
          
          ### 系统要求
          - Windows 10 或更高版本 (64位)
          - 至少 2GB 内存
          - 至少 500MB 可用磁盘空间
          
          ### 功能特性
          - 📚 学术论文 PDF 阅读
          - 🤖 多引擎 PDF 解析 (PyMuPDF/Marker/MinerU)
          - 🌐 AI 翻译支持
          - 💾 本地数据管理
        releaseDraft: true
        prerelease: false
        args: "--bundles msi,nsis"
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: PaperLens-Windows
        path: |
          src-tauri/target/release/bundle/msi/*.msi
          src-tauri/target/release/bundle/nsis/*.exe
