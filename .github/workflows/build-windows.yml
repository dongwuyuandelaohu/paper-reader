name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-pc-windows-msvc
    
    - name: Install frontend dependencies
      run: npm install
      working-directory: ./frontend
    
    - name: Build frontend
      run: npm run build
      working-directory: ./frontend
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
      working-directory: ./backend
    
    - name: Build backend executable
      run: |
        Write-Host "=== Starting PyInstaller build ==="
        Write-Host "Current directory: $(Get-Location)"
        Write-Host "Files in current directory:"
        Get-ChildItem -Name
        Write-Host ""
        
        pyinstaller main.spec --clean --noconfirm 2>&1 | Tee-Object -Variable pyinstallerOutput
        $exitCode = $LASTEXITCODE
        
        Write-Host ""
        Write-Host "=== PyInstaller exit code: $exitCode ==="
        Write-Host ""
        
        Write-Host "=== Checking dist directory ==="
        if (Test-Path "dist") {
            Get-ChildItem -Path "dist" -Recurse | ForEach-Object { Write-Host $_.FullName }
        } else {
            Write-Host "dist directory does not exist!"
        }
        
        if ($exitCode -ne 0) {
            Write-Error "PyInstaller failed with exit code $exitCode"
            exit $exitCode
        }
        
        if (-not (Test-Path "dist/main.exe")) {
            Write-Error "dist/main.exe was not created!"
            exit 1
        }
        
        Write-Host "✓ Build successful: dist/main.exe"
      working-directory: ./backend
      shell: pwsh
    
    - name: List backend dist contents
      run: |
        Write-Host "=== backend/dist contents ==="
        if (Test-Path "backend/dist") {
            Get-ChildItem -Path "backend/dist" -Recurse | Select-Object FullName, Length
        } else {
            Write-Error "backend/dist directory does not exist!"
            exit 1
        }
        Write-Host "=== Checking for main.exe ==="
        if (Test-Path "backend/dist/main.exe") {
            Write-Host "✓ Found backend/dist/main.exe"
        } else {
            Write-Error "backend/dist/main.exe not found!"
            exit 1
        }
      shell: pwsh
    
    - name: Copy backend to Tauri resources
      run: |
        New-Item -ItemType Directory -Force -Path "src-tauri/resources/backend" | Out-Null
        Copy-Item -Path "backend/dist/main.exe" -Destination "src-tauri/resources/backend/" -Force
      shell: pwsh
    
    - name: Build Tauri app
      uses: tauri-apps/tauri-action@v0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tagName: v__VERSION__
        releaseName: "PaperLens v__VERSION__"
        releaseBody: |
          ## PaperLens - 学术论文阅读助手
          
          ### 安装说明
          1. 下载 `PaperLens_x64_en-US.msi` 或 `PaperLens_x64-setup.exe`
          2. 运行安装程序
          3. 按照提示完成安装
          
          ### 系统要求
          - Windows 10 或更高版本 (64位)
          - 至少 2GB 内存
          - 至少 500MB 可用磁盘空间
          
          ### 功能特性
          - 📚 学术论文 PDF 阅读
          - 🤖 多引擎 PDF 解析 (PyMuPDF/Marker/MinerU)
          - 🌐 AI 翻译支持
          - 💾 本地数据管理
        releaseDraft: true
        prerelease: false
        args: "--bundles msi,nsis"
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: PaperLens-Windows
        path: |
          src-tauri/target/release/bundle/msi/*.msi
          src-tauri/target/release/bundle/nsis/*.exe
