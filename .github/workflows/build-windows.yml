name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-pc-windows-msvc

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # ---- Frontend ----
    - name: Install frontend dependencies
      run: npm install
      working-directory: ./frontend

    - name: Build frontend
      run: npm run build
      working-directory: ./frontend

    # ---- Backend (PyInstaller) ----
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -r requirements.txt
        python -m pip install pyinstaller
      working-directory: ./backend

    - name: Build backend with PyInstaller
      run: |
        Write-Host "=== Running PyInstaller ==="
        Write-Host "Working dir: $(Get-Location)"
        python -m PyInstaller main.spec --clean --noconfirm
        if ($LASTEXITCODE -ne 0) {
          Write-Error "PyInstaller failed"
          exit 1
        }
        Write-Host ""
        Write-Host "=== Checking output ==="
        if (Test-Path "dist/main/main.exe") {
          Write-Host "OK dist/main/main.exe exists"
          $exe = Get-Item "dist/main/main.exe"
          Write-Host "  Size: $([math]::Round($exe.Length / 1MB, 1)) MB"
          Get-ChildItem -Path "dist/main" | ForEach-Object { Write-Host "  $($_.Name)" }
        } else {
          Write-Error "dist/main/main.exe not found!"
          if (Test-Path "dist") {
            Get-ChildItem -Path "dist" -Recurse | Select-Object FullName
          }
          exit 1
        }
      working-directory: ./backend
      shell: pwsh

    - name: Smoke test backend exe
      run: |
        Write-Host "=== Smoke test ==="
        $exeDir = (Resolve-Path "backend\dist\main").Path
        Write-Host "Exe dir: $exeDir"

        # IMPORTANT: Do NOT use -RedirectStandardOutput/Error here!
        # That creates pipes with 4KB buffers. If nobody reads, the process
        # blocks on write (pipe deadlock). Let output go to CI console instead.
        $proc = Start-Process -FilePath "$exeDir\main.exe" `
          -WorkingDirectory $exeDir `
          -PassThru
        Write-Host "Started PID: $($proc.Id)"

        $healthy = $false
        for ($i = 0; $i -lt 60; $i++) {
          Start-Sleep -Seconds 1

          if ($proc.HasExited) {
            Write-Error "Backend EXITED with code: $($proc.ExitCode)"
            exit 1
          }

          try {
            $resp = Invoke-WebRequest -Uri "http://localhost:8765/api/v1/system/health" -TimeoutSec 3 -UseBasicParsing
            if ($resp.StatusCode -eq 200) {
              Write-Host "OK Health check passed after $($i+1)s"
              Write-Host "Response: $($resp.Content)"
              $healthy = $true
              break
            }
          } catch {
            if ($i % 10 -eq 0) { Write-Host "  Waiting... ($($i+1)/60)" }
          }
        }

        taskkill /PID $proc.Id /T /F 2>$null | Out-Null

        if (-not $healthy) {
          Write-Error "Smoke test FAILED - backend did not respond in 60s"
          exit 1
        }
      shell: pwsh

    - name: Copy backend to Tauri resources
      run: |
        $src = "backend/dist/main"
        $dst = "src-tauri/resources/backend"
        if (Test-Path $dst) { Remove-Item -Recurse -Force $dst }
        Copy-Item -Path $src -Destination $dst -Recurse -Force
        Write-Host "OK Copied backend to $dst"
        Get-ChildItem -Path $dst | ForEach-Object { Write-Host "  $($_.Name)" }
      shell: pwsh

    # ---- Root npm ----
    - name: Install root dependencies
      run: npm install

    # ---- Tauri build ----
    - name: Build Tauri app
      uses: tauri-apps/tauri-action@v0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tagName: v__VERSION__
        releaseName: "PaperLens v__VERSION__"
        releaseBody: |
          ## PaperLens - 学术论文阅读助手

          ### 安装说明
          1. 下载 MSI 或 NSIS 安装包
          2. 运行安装程序
          3. 双击桌面快捷方式启动

          ### 系统要求
          - Windows 10/11 (64 位)
          - 2 GB 内存
          - 500 MB 磁盘空间
          - [Visual C++ Redistributable 2015-2022](https://aka.ms/vs/17/release/vc_redist.x64.exe)（全新 Windows 可能需要安装）

          ### 启动问题排查
          如果启动后一直显示"正在启动"：
          1. 安装上方链接的 Visual C++ Redistributable
          2. 重启应用
          3. 日志位于 `%APPDATA%\PaperLens\data\backend.log`
        releaseDraft: true
        prerelease: false
        args: "--bundles msi,nsis"

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: PaperLens-Windows
        path: |
          src-tauri/target/release/bundle/msi/*.msi
          src-tauri/target/release/bundle/nsis/*.exe
